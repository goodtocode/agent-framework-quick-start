parameters:
  - name: artifactsPath
    type: string 
    default: "."
  - name: buildConfiguration
    type: string 
    default: "Release"
  - name: nugetPathFile
    type: string 
    default: ".nuget/NuGet.config"
  - name: srcPath
    type: string 
    default: "."
  - name: srcNuspec
    type: string 
    default: "*.nuspec"
  - name: srcSolution
    type: string 
    default: "*.sln"
  - name: scriptsPath
    type: string 
    default: "../scripts"
  - name: versionToReplace
    type: string 
    default: "1.0.0"
  - name: versionMajor
    type: string
    default: "1"
  - name: versionMinor
    type: string
    default: "1"

steps:
  - task: PowerShell@2
    displayName: 'Get-Version.ps1'
    inputs:
      targetType: 'inline'
      script: |
        $json = & "${{ parameters.scriptsPath }}/Get-Version.ps1" -VersionToReplace "${{ parameters.versionToReplace }}" -Major ${{ parameters.versionMajor }} -Minor ${{ parameters.versionMinor }} -Patch $(Build.BuildId)
        $versionObj = $json | ConvertFrom-Json

        Write-Host "##vso[task.setvariable variable=semanticVersion]$($versionObj.SemanticVersion)"
        Write-Host "##vso[task.setvariable variable=fileVersion]$($versionObj.FileVersion)"
        Write-Host "##vso[task.setvariable variable=assemblyVersion]$($versionObj.AssemblyVersion)"
        Write-Host "##vso[task.setvariable variable=informationalVersion]$($versionObj.InformationalVersion)"

  - task: PowerShell@2
    displayName: 'Set-Version.ps1'
    inputs:
      filePath: '${{ parameters.scriptsPath }}/Set-Version.ps1'
      arguments: '-Path ${{ parameters.srcPath }} -VersionToReplace ${{ parameters.versionToReplace }} -Major ${{ parameters.versionMajor }} -Minor ${{ parameters.versionMinor }} -Patch $(Build.BuildId)'
      workingDirectory: '${{ parameters.scriptsPath }}'

  - task: DotNetCoreCLI@2
    displayName: 'dotnet restore'
    inputs:
      command: 'restore'
      projects: |
        ${{ parameters.srcPath }}/**/${{ parameters.srcProject }}
      feedsToUse: config
      nugetConfigPath: ${{ parameters.nugetPathFile }}

  - task: DotNetCoreCLI@2
    displayName: 'dotnet build'
    inputs:
      command: 'build'
      projects: |
        ${{ parameters.srcPath }}/**/${{ parameters.srcSolution }}
      arguments: '--configuration ${{ parameters.buildConfiguration }} /p:Version=$(semanticVersion) /p:FileVersion=$(fileVersion) /p:AssemblyVersion=$(assemblyVersion) /p:InformationalVersion=$(informationalVersion)'

# Package a project
  - task: NuGetCommand@2
    inputs:
      command: 'pack'
      packagesToPack: ${{ parameters.srcPath }}/**/${{ parameters.srcNuspec }}
      packDestination: '${{ parameters.artifactsPath }}'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact: drop'
    inputs:
      pathToPublish: '${{ parameters.artifactsPath }}'
      artifactName: drop