parameters:
  - name: artifactsPath
    type: string 
    default: "."
  - name: archiveFile
    type: string 
    default: "archive.zip"
  - name: srcPath
    type: string 
    default: "."
  - name: scriptsPath
    type: string 
    default: "../scripts"
  - name: tempPath
    type: string 
    default: './sitetemp'
  - name: versionToReplace
    type: string 
    default: "1.0.0"
  - name: versionMajor
    type: string
    default: "1"
  - name: versionMinor
    type: string
    default: "1"

steps:
  - task: PowerShell@2
    displayName: 'Get-Version.ps1'
    inputs:
      targetType: 'inline'
      script: |
        $json = & "${{ parameters.scriptsPath }}/Get-Version.ps1" -VersionToReplace "${{ parameters.versionToReplace }}" -Major ${{ parameters.versionMajor }} -Minor ${{ parameters.versionMinor }} -Patch $(Build.BuildId)
        $versionObj = $json | ConvertFrom-Json

        Write-Host "##vso[task.setvariable variable=semanticVersion]$($versionObj.SemanticVersion)"
        Write-Host "##vso[task.setvariable variable=fileVersion]$($versionObj.FileVersion)"
        Write-Host "##vso[task.setvariable variable=assemblyVersion]$($versionObj.AssemblyVersion)"
        Write-Host "##vso[task.setvariable variable=informationalVersion]$($versionObj.InformationalVersion)"

  - task: PowerShell@2
    displayName: 'Set-Version.ps1'
    inputs:
      filePath: '${{ parameters.scriptsPath }}/Set-Version.ps1'
      arguments: '-Path ${{ parameters.srcPath }} -VersionToReplace ${{ parameters.versionToReplace }} -Major ${{ parameters.versionMajor }} -Minor ${{ parameters.versionMinor }} -Patch $(Build.BuildId)'
      workingDirectory: '${{ parameters.scriptsPath }}'

  - task: NodeTool@0
    displayName: Install Node.js
    inputs:
      versionSpec: '110.x'

  - task: Npm@1
    displayName: 'npm install'
    inputs:
      command: 'install'
      workingDir: '${{ parameters.srcPath }}'

  - task: Npm@1
    displayName: 'npm run build'
    inputs:
      command: 'custom'
      customCommand: 'run build'
      workingDir: '${{ parameters.srcPath }}'

  - task: DeleteFiles@1
    displayName: 'delete tempPath'
    inputs:
      SourceFolder: '${{ parameters.tempPath }}'
      Contents: '**/*'
      RemoveDotFiles: true

  - task: CopyFiles@2
    displayName: 'copy wwwroot'
    inputs:
      SourceFolder: '${{ parameters.srcPath }}/wwwroot'
      Contents: '**'
      TargetFolder: '${{ parameters.tempPath }}'
      CleanTargetFolder: true
      OverWrite: true

  - task: ArchiveFiles@2
    displayName: 'Archive ${{ parameters.archiveFile }}'
    inputs:
      rootFolderOrFile: '${{ parameters.tempPath }}'
      includeRootFolder: false
      archiveType: zip
      archiveFile: '${{ parameters.artifactsPath }}/${{ parameters.archiveFile }}'
      replaceExistingArchive: true

  - task: DeleteFiles@1
    displayName: 'delete tempPath'
    inputs:
      SourceFolder: '${{ parameters.tempPath }}'
      Contents: '**/*'
      RemoveDotFiles: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact: drop'
    inputs:
      pathToPublish: '${{ parameters.artifactsPath }}'
      artifactName: drop