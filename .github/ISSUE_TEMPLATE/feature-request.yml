name: Feature Request
description: Define a feature using the repository's AI-first structure
title: "feat: <short-feature-title>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form to create implementation-ready feature requests aligned to governance and Sprint 0 artifacts.

  - type: input
    id: business-problem
    attributes:
      label: Business Problem
      description: What problem are we solving?
      placeholder: Describe current pain and impact
    validations:
      required: true

  - type: textarea
    id: business-value
    attributes:
      label: Business Value
      description: What measurable value does this feature produce?
      placeholder: Time saved, risk reduced, revenue impact, user outcome
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Use the standard format
      placeholder: As a <role>, I want <capability>, so that <outcome>.
    validations:
      required: true

  - type: textarea
    id: ontology-concepts
    attributes:
      label: Related Ontology Concepts
      description: Terms from docs/product/sprint-0/ontology.md
      placeholder: List canonical terms
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Testable outcomes
      placeholder: "- [ ] ..."
    validations:
      required: true

  - type: textarea
    id: functional-requirements
    attributes:
      label: Functional Requirements
      description: Required behavior
    validations:
      required: true

  - type: textarea
    id: non-functional-requirements
    attributes:
      label: Non-Functional Requirements
      description: Security, performance, reliability, observability
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Explicit exclusions
    validations:
      required: false
